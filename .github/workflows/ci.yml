name: CI

on:
  push:
    branches: [main, pre-commercialization-real]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # 빌드 시 필요한 환경변수 (더미값 — 실제 연결 없음)
          MONGODB_URI: 'mongodb://localhost:27017/ci-test'
          PUSHER_APP_ID: 'ci'
          PUSHER_KEY: 'ci'
          PUSHER_SECRET: 'ci'
          PUSHER_CLUSTER: 'ap3'
